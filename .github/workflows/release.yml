name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          # Uncomment to also publish macOS / Linux installers in the same release.
          # - platform: macos-latest
          #   args: "--target universal-apple-darwin"
          # - platform: ubuntu-22.04
          #   args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ViewDocx ${{ github.ref_name }}"
          releaseBody: |
            ## ViewDocx ${{ github.ref_name }}

            ### Install
            Download the Windows installer from the assets below:

            - **`*-setup.exe`** — NSIS installer (recommended for end users)
            - **`*.msi`** — MSI installer (for IT / silent deployment)
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
